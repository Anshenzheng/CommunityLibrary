<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card shadow-lg">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <h2 class="mb-2">📚 创建账户</h2>
          <p class="text-muted">加入社区图书角，开启阅读之旅</p>
        </div>
        
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">用户名 <span class="text-danger">*</span></label>
              <input 
                type="text" 
                class="form-control"
                formControlName="username"
                placeholder="3-50个字符"
                [class.is-invalid]="submitted && f['username'].errors"
              >
              <div *ngIf="submitted && f['username'].errors" class="text-danger small mt-1">
                <span *ngIf="f['username'].errors['required']">请输入用户名</span>
                <span *ngIf="f['username'].errors['minlength']">用户名至少3个字符</span>
                <span *ngIf="f['username'].errors['maxlength']">用户名最多50个字符</span>
              </div>
            </div>
            
            <div class="col-md-6 mb-3">
              <label class="form-label">真实姓名 <span class="text-danger">*</span></label>
              <input 
                type="text" 
                class="form-control"
                formControlName="realName"
                placeholder="请输入真实姓名"
                [class.is-invalid]="submitted && f['realName'].errors"
              >
              <div *ngIf="submitted && f['realName'].errors" class="text-danger small mt-1">
                请输入真实姓名
              </div>
            </div>
          </div>
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">密码 <span class="text-danger">*</span></label>
              <input 
                type="password" 
                class="form-control"
                formControlName="password"
                placeholder="至少6个字符"
                [class.is-invalid]="submitted && f['password'].errors"
              >
              <div *ngIf="submitted && f['password'].errors" class="text-danger small mt-1">
                <span *ngIf="f['password'].errors['required']">请输入密码</span>
                <span *ngIf="f['password'].errors['minlength']">密码至少6个字符</span>
              </div>
            </div>
            
            <div class="col-md-6 mb-3">
              <label class="form-label">确认密码 <span class="text-danger">*</span></label>
              <input 
                type="password" 
                class="form-control"
                formControlName="confirmPassword"
                placeholder="再次输入密码"
                [class.is-invalid]="submitted && (f['confirmPassword'].errors || registerForm.errors?.['passwordMismatch'])"
              >
              <div *ngIf="submitted" class="text-danger small mt-1">
                <span *ngIf="f['confirmPassword'].errors?.['required']">请确认密码</span>
                <span *ngIf="registerForm.errors?.['passwordMismatch']">两次密码不一致</span>
              </div>
            </div>
          </div>
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">邮箱</label>
              <input 
                type="email" 
                class="form-control"
                formControlName="email"
                placeholder="请输入邮箱"
                [class.is-invalid]="submitted && f['email'].errors"
              >
              <div *ngIf="submitted && f['email'].errors" class="text-danger small mt-1">
                请输入有效的邮箱地址
              </div>
            </div>
            
            <div class="col-md-6 mb-3">
              <label class="form-label">手机号</label>
              <input 
                type="tel" 
                class="form-control"
                formControlName="phone"
                placeholder="请输入手机号"
              >
            </div>
          </div>
          
          <div class="mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="agreeTerms" required>
              <label class="form-check-label text-muted small" for="agreeTerms">
                我已阅读并同意 <a href="#" class="text-decoration-none">用户协议</a> 和 <a href="#" class="text-decoration-none">隐私政策</a>
              </label>
            </div>
          </div>
          
          <button 
            type="submit" 
            class="btn btn-primary btn-lg w-100"
            [disabled]="loading"
          >
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            {{ loading ? '注册中...' : '注册账户' }}
          </button>
        </form>
        
        <div class="text-center mt-4">
          <p class="text-muted mb-0">
            已有账户？
            <a routerLink="/login" class="text-decoration-none">立即登录</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
